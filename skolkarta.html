<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sveriges skolresultat — meritvärde åk 9</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #181c27;
    --border: rgba(255,255,255,0.07);
    --text: #e8e6e0; --muted: #7a7870; --accent: #c8f04a;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh; display: grid;
    grid-template-rows: auto 1fr; overflow: hidden;
  }
  header {
    padding: 18px 28px; display: flex;
    align-items: baseline; gap: 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface); flex-wrap: wrap;
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; font-weight: 400; }
  header p  { font-size: 0.78rem; color: var(--muted); font-weight: 300; }
  #status {
    margin-left: auto; font-size: 0.72rem; color: var(--accent);
    background: rgba(255,255,255,0.04);
    padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border); transition: color 0.3s;
  }
  #status.done  { color: var(--muted); }
  #status.error { color: #e05252; }
  #map { width: 100%; height: 100%; background: var(--bg); }
  .leaflet-container { background: #0f1117 !important; }
  #progress-wrap {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; z-index: 2000; pointer-events: none;
  }
  #progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s ease; }
  .legend {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    font-family: 'DM Sans', sans-serif; color: var(--text); min-width: 170px;
  }
  .legend h4 {
    font-size: 0.7rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 10px;
  }
  .legend-bar {
    height: 8px; border-radius: 4px;
    background: linear-gradient(to right, #e05252, #e09b30, #c8f04a);
    margin-bottom: 6px;
  }
  .legend-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 0.72rem; color: var(--muted); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
  .leaflet-tooltip {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: 8px !important; color: var(--text) !important;
    font-family: 'DM Sans', sans-serif !important; font-size: 0.82rem !important;
    padding: 8px 12px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
    pointer-events: none !important;
  }
  .tooltip-name  { font-weight: 500; margin-bottom: 3px; }
  .tooltip-value { color: var(--accent); font-weight: 500; }
  .tooltip-sub   { color: var(--muted); font-size: 0.72rem; margin-top: 2px; }
  .tooltip-no-data { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>Sveriges skolresultat</h1>
  <p>Meritvärde åk 9 · 2024/25 · medelvärde per kommun</p>
  <span id="status">Startar...</span>
</header>
<div id="map"></div>
<div id="progress-wrap"><div id="progress-bar"></div></div>

<script>
const GEOJSON_URL = 'https://raw.githubusercontent.com/GioPalusa/SwedenGeoJSON/a176ba59cc52140383dea3bdb72e95eb586053d9/Kommun/kommun.geojson';
const API_BASE    = 'https://api.skolverket.se/planned-educations/v3';
const TARGET_YEAR = '2024/25';
const BATCH_SIZE  = 10;
const PAGE_SIZE   = 100;
const MIN_VALUE   = 180;
const MAX_VALUE   = 290;

const statusEl   = document.getElementById('status');
const progressEl = document.getElementById('progress-bar');

function setStatus(msg, cls = '') { statusEl.textContent = msg; statusEl.className = cls; }
function setProgress(pct) { progressEl.style.width = Math.min(100, pct) + '%'; }

function getColor(value) {
  if (value == null) return '#2a2a35';
  const t = Math.max(0, Math.min(1, (value - MIN_VALUE) / (MAX_VALUE - MIN_VALUE)));
  if (t < 0.5) {
    const u = t * 2;
    return `rgb(224,${Math.round(82 + 73*u)},${Math.round(82 - 34*u)})`;
  }
  const u = (t - 0.5) * 2;
  return `rgb(${Math.round(224 - 24*u)},${Math.round(155 + 85*u)},${Math.round(48 + 26*u)})`;
}

const map = L.map('map', { center: [62.5, 16], zoom: 5 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

async function batchFetch(items, fetchFn, onProgress) {
  const results = new Array(items.length);
  for (let i = 0; i < items.length; i += BATCH_SIZE) {
    const chunk = items.slice(i, i + BATCH_SIZE);
    const res   = await Promise.all(chunk.map(fetchFn));
    res.forEach((r, j) => { results[i + j] = r; });
    onProgress(Math.min(i + BATCH_SIZE, items.length), items.length);
  }
  return results;
}

async function fetchAllSchools() {
  setStatus('Hämtar skollista sida 1...');
  const first = await fetch(`${API_BASE}/school-units?size=${PAGE_SIZE}&page=0`).then(r => r.json());
  const totalPages = first.body.page.totalPages;
  let schools = first.body._embedded.listedSchoolUnits;

  setStatus(`Hämtar skollista (${totalPages} sidor)...`);
  const pages = Array.from({ length: totalPages - 1 }, (_, i) => i + 1);

  await batchFetch(pages, async (page) => {
    const d = await fetch(`${API_BASE}/school-units?size=${PAGE_SIZE}&page=${page}`).then(r => r.json());
    schools = schools.concat(d.body._embedded.listedSchoolUnits);
  }, (done, total) => {
    setProgress((done / total) * 25);
    setStatus(`Skollista: ${schools.length} skolor hämtade...`);
  });

  return schools;
}

function filterHighGradeSchools(schools) {
  return schools.filter(s =>
    s.typeOfSchooling?.some(t =>
      t.code === 'gr' && t.schoolYears?.some(y => ['7','8','9'].includes(y))
    )
  );
}

async function fetchMeritValue(school) {
  try {
    const res = await fetch(`${API_BASE}/school-units/${school.code}/statistics/gr`);
    if (!res.ok) return null;
    const data = await res.json();
    const entries = data.body?.averageGradesMeritRating9thGrade;
    if (!entries) return null;
    const entry = entries.find(e => e.timePeriod === TARGET_YEAR && e.valueType === 'EXISTS');
    return entry ? parseFloat(entry.value.replace(',', '.')) : null;
  } catch { return null; }
}

function aggregateByMunicipality(schools, meritValues) {
  const acc = {};
  schools.forEach((s, i) => {
    const val = meritValues[i];
    if (val == null) return;
    const kod = s.geographicalAreaCode;
    if (!acc[kod]) acc[kod] = { sum: 0, count: 0 };
    acc[kod].sum += val;
    acc[kod].count += 1;
  });
  const result = {};
  Object.entries(acc).forEach(([kod, { sum, count }]) => {
    result[kod] = Math.round((sum / count) * 10) / 10;
  });
  return result;
}

function renderMap(geojson, skoldata) {
  const values    = Object.values(skoldata);
  const actualMin = Math.round(Math.min(...values) * 10) / 10;
  const actualMax = Math.round(Math.max(...values) * 10) / 10;
  const mid       = Math.round((actualMin + actualMax) / 2 * 10) / 10;

  L.geoJSON(geojson, {
    style: feature => {
      const kod   = feature.properties.kommunkod;
      const value = skoldata[kod] ?? null;
      return {
        fillColor: getColor(value), fillOpacity: value != null ? 0.78 : 0.25,
        color: '#1a1f2e', weight: 0.5, opacity: 1,
      };
    },
    onEachFeature: (feature, layer) => {
      const kod   = feature.properties.kommunkod;
      const namn  = feature.properties.namnkortform || kod;
      const value = skoldata[kod] ?? null;

      layer.bindTooltip(`
        <div class="tooltip-name">${namn}</div>
        ${value != null
          ? `<div class="tooltip-value">Meritvärde: ${value}</div>
             <div class="tooltip-sub">Snitt grundskolor åk 7–9 · ${TARGET_YEAR}</div>`
          : `<div class="tooltip-no-data">Ingen data tillgänglig</div>`}
      `, { sticky: true, opacity: 1 });

      layer.on({
        mouseover: e => {
          e.target.setStyle({ fillOpacity: 1, weight: 1.5, color: '#ffffff' });
          e.target.bringToFront();
        },
        mouseout: e => {
          e.target.setStyle({
            fillOpacity: value != null ? 0.78 : 0.25,
            weight: 0.5, color: '#1a1f2e'
          });
        }
      });
    }
  }).addTo(map);

  const legend = L.control({ position: 'bottomleft' });
  legend.onAdd = () => {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = `
      <h4>Meritvärde åk 9</h4>
      <div class="legend-bar"></div>
      <div class="legend-labels">
        <span>${actualMin}</span><span>${mid}</span><span>${actualMax}</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background:#2a2a35;border:1px solid #444"></div>
        Ingen data
      </div>`;
    return div;
  };
  legend.addTo(map);

  setStatus(`${Object.keys(skoldata).length} kommuner klara`, 'done');
  setProgress(100);
  setTimeout(() => { progressEl.style.opacity = '0'; }, 1500);
}

async function main() {
  try {
    const [geojson, allSchools] = await Promise.all([
      fetch(GEOJSON_URL).then(r => r.json()),
      fetchAllSchools()
    ]);

    const relevant = filterHighGradeSchools(allSchools);
    setStatus(`Hämtar statistik för ${relevant.length} skolor...`);
    setProgress(25);

    const meritValues = await batchFetch(
      relevant,
      fetchMeritValue,
      (done, total) => {
        setProgress(25 + (done / total) * 70);
        setStatus(`Statistik: ${done}/${total} skolor`);
      }
    );

    setStatus('Beräknar kommunmedelvärden...');
    setProgress(96);

    const skoldata = aggregateByMunicipality(relevant, meritValues);
    renderMap(geojson, skoldata);

  } catch (err) {
    setStatus('Fel: ' + err.message, 'error');
    console.error(err);
  }
}

main();
</script>
</body>
</html>
